{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="card card-spaced card-border">
        <div class="card-body">
            <form class="update-form" action="" method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button class="btn btn-primary btn-shadow" type="submit">Finish Edit</button>
            </form>
        </div>
    </div>
    <div class="danger-text text-shadow-glow text-center">
        <h3>
            Back to <a href="{% url 'article_list' %}">Articles</a>
        </h3>
    </div>
{% endblock content %}
